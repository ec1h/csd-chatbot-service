name: Deploy Chatbot Service

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: choice
        required: true
        options:
          - test
          - qa
          - uat
          - prod
      seed:
        description: "Run Seed?"
        type: boolean
        required: true
        default: false

run-name: Deploy Chatbot to ${{ inputs.environment }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: csd-chatbot-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  backup-db:
    if: ${{ inputs.environment == 'prod' || inputs.environment == 'qa' || inputs.environment == 'uat' }}
    uses: ./.github/workflows/local-db-backup.yml
    with:
      environment: ${{ inputs.environment }}

  db-migrations:
    if: always()
    needs: [backup-db]
    name: DB migrations
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install pg dotenv

      - name: Load environment variables
        uses: aarcangeli/load-dotenv@v1
        with:
          path: .github/environments
          filenames: .env.${{ inputs.environment }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418043725:role/csd-cicd-role
          aws-region: af-south-1

      - name: Get database password from Secrets Manager
        run: |
          DB_PASSWORD=$(aws secretsmanager get-secret-value --secret-id ${{ env.DB_PASSWORD_SECRET_NAME }} --query SecretString --output text)
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      - name: Run migrations
        run: |
          export DB_HOST="${{ env.DB_HOST }}"
          export DB_PORT="${{ env.DB_PORT }}"
          export DB_NAME="${{ env.DB_NAME }}"
          export DB_USERNAME="${{ env.DB_USERNAME }}"
          export DB_PASSWORD="${{ env.DB_PASSWORD }}"
          export ENVIRONMENT="${{ inputs.environment }}"
          node ./database/migrations/migrate.js up

      - name: Run seed (if requested)
        if: ${{ inputs.run_seed }}
        run: |
          echo "Running seed data..."
          # Add seed script here

  # Depends only on inline db-migrations (no workflow_call in the needs chain).
  deploy-infra-and-app:
    name: Deploy infra and app
    runs-on: ubuntu-latest
    needs: [db-migrations]
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_service_version: ${{ github.ref_type == 'branch' && github.sha || github.ref_name }}
      TERRAGRUNT_NON_INTERACTIVE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418043725:role/csd-cicd-role
          aws-region: af-south-1
          role-session-name: github-${{ github.run_id }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.68.6"

      - name: Terragrunt Apply (database)
        working-directory: iac/non-prod/${{ inputs.environment }}/database
        run: terragrunt apply -auto-approve -no-color

      - name: Terragrunt Apply (vpc)
        working-directory: iac/non-prod/${{ inputs.environment }}/vpc
        run: terragrunt apply -auto-approve -no-color

      - name: Load environment variables
        uses: aarcangeli/load-dotenv@v1
        with:
          path: .github/environments
          filenames: .env.${{ inputs.environment }}

      - name: Get database password from Secrets Manager
        run: |
          DB_PASSWORD=$(aws secretsmanager get-secret-value --secret-id ${{ env.DB_PASSWORD_SECRET_NAME }} --query SecretString --output text)
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install pg @aws-sdk/client-secrets-manager

      - name: Generate and store API key
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          chmod +x ./scripts/setup-api-key.sh
          ./scripts/setup-api-key.sh ${{ inputs.environment }}

      - name: Terragrunt Apply (csd-chatbot)
        working-directory: iac/non-prod/${{ inputs.environment }}/csd-chatbot
        run: terragrunt apply -auto-approve -no-color

  export-openapi:
    if: ${{ inputs.environment != 'prod' }}
    needs: [deploy-infra-and-app]
    name: Export OpenAPI to S3
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load environment variables
        uses: aarcangeli/load-dotenv@v1
        with:
          path: .github/environments
          filenames: .env.${{ inputs.environment }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418043725:role/csd-cicd-role
          aws-region: af-south-1
          role-session-name: github-${{ github.run_id }}
          role-duration-seconds: 900

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download exporter script
        run: |
          mkdir -p scripts
          aws s3 cp "s3://csd-openapi-definitions-${{ inputs.environment }}/export-openapi.sh" "./export-openapi.sh" --region "af-south-1"
          chmod +x ./export-openapi.sh

      - name: Run OpenAPI exporter
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION: af-south-1
          SERVICE: csd-chatbot
        run: ./export-openapi.sh